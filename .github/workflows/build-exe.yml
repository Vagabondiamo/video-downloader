name: Build EXE for All Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install yt-dlp pyinstaller
    
    - name: Build executable (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        pyinstaller --onefile --windowed --name VideoDownloader --clean vddownloader/app.py
        mv dist/VideoDownloader.exe VideoDownloader-Windows.exe
    
    - name: Build executable (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        pyinstaller --onefile --windowed --name VideoDownloader --clean vddownloader/app.py
        mv dist/VideoDownloader VideoDownloader-macOS
        chmod +x VideoDownloader-macOS
    
    - name: Build executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        pyinstaller --onefile --windowed --name VideoDownloader --clean vddownloader/app.py
        mv dist/VideoDownloader VideoDownloader-Linux
        chmod +x VideoDownloader-Linux
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoDownloader-${{ matrix.name }}
        path: |
          VideoDownloader-*.exe
          VideoDownloader-macOS
          VideoDownloader-Linux

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
    
    - name: List files
      run: ls -la
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          VideoDownloader-Windows.exe
          VideoDownloader-macOS
          VideoDownloader-Linux
        name: Video Downloader v1.0
        body: |
          ## Download
          - **Windows**: VideoDownloader-Windows.exe (doppio click per eseguire)
          - **macOS**: VideoDownloader-macOS (apri Terminale e scrivi `chmod +x` poi trascina il file)
          - **Linux**: VideoDownloader-Linux (apri terminale e scrivi `chmod +x` poi trascina il file)
          
          ## Istruzioni
          ### macOS/Linux
          Apri il Terminale, scrivi:
          ```bash
          chmod +x "percorso/del/file"
          ```
          Poi eseguilo con:
          ```bash
          "./percorso/del/file"
          ```
          
          ## Requisiti
          - Python 3.11+ installato
          - yt-dlp (installato automaticamente se mancante)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
